spring.application.name=protospace-c

# ポート設定（本番環境では環境変数で上書き）
server.port=${PORT:8080}

# データベース設定（本番環境では環境変数で上書き）
spring.datasource.url=${DB_URL:jdbc:postgresql://${POSTGRES_HOSTNAME:localhost}:5432/protospace}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# local限定（本番環境では環境変数からtrueに上書き推奨）
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:false}

mybatis.configuration.map-underscore-to-camel-case=true

# Spring DevTool 設定
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

# 本番環境では環境変数に入れる(これはローカル用のダミー)
app.jwt.secret=${JWT_SECRET:your-super-secret-key-that-is-very-long-and-secure-32-characters-minimum}
app.jwt.expiration=86400000

# 開発環境（localプロファイル）として起動する（本番環境では環境変数で上書き）
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# CORS設定（本番環境等では環境変数等で上書き可能にする）
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
